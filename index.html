}
@keyframes floatUp {
  0%   { transform:translateY(100vh) scale(0); opacity:0; }
  10%  { opacity:0.8; }
  90%  { opacity:0.4; }
  100% { transform:translateY(-10vh) scale(1.5); opacity:0; }
}

/* MODE SWITCHER */
.mode-switcher {
  position:fixed; top:16px; right:16px; z-index:1000; display:flex; gap:8px;
}
.mode-btn {
  background:rgba(212,150,150,0.15); border:1px solid var(--blush);
  color:var(--blush-lt); padding:6px 14px;
  font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.1em;
  cursor:pointer; border-radius:2px; transition:all 0.3s;
}
.mode-btn.active, .mode-btn:hover { background:var(--blush); color:var(--rose-deep); }

/* SCREENS */
.screen { display:none; min-height:100svh; position:relative; z-index:1; flex-direction:column; align-items:center; justify-content:center; }
.screen.active { display:flex; }

/* INTRO */
#intro {
  text-align:center; padding:80px 24px 60px;
  background:rgba(42,32,35,0.72);
}
.logo-wrap { margin-bottom:28px; animation:fadeInDown 1.2s ease both; }
.logo-wrap-text {
  font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.55em;
  color:rgba(255,255,255,0.45); text-transform:uppercase;
  display:block; text-align:center;
}
.intro-title {
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(22px,5vw,42px); color:var(--blush-lt);
  letter-spacing:0.08em; animation:fadeInDown 1.4s 0.2s ease both;
  text-shadow:0 0 40px rgba(212,150,150,0.4); line-height:1.3;
}
.intro-subtitle {
  font-family:'Cinzel',serif; font-size:clamp(12px,2vw,16px);
  color:var(--blush); letter-spacing:0.3em;
  margin:12px 0 8px; animation:fadeInDown 1.4s 0.4s ease both;
}
.intro-desc {
  font-size:15px; color:var(--blush-pale); opacity:0.75;
  margin:16px auto 36px; max-width:380px; line-height:1.8;
  animation:fadeInDown 1.4s 0.6s ease both;
}
.gold-divider {
  width:200px; height:1px;
  background:linear-gradient(to right,transparent,var(--blush),transparent);
  margin:20px auto; animation:fadeInDown 1.4s 0.5s ease both;
}
@keyframes fadeInDown {
  from { opacity:0; transform:translateY(-30px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

/* BUTTONS */
.btn-primary {
  font-family:'Cinzel',serif; font-size:14px; letter-spacing:0.2em;
  color:#3A2E2E;
  background:linear-gradient(135deg,#C8A882 0%,#E8D5B0 35%,#D4B896 50%,#E8D5B0 65%,#C8A882 100%);
  border:none; padding:14px 40px; cursor:pointer; border-radius:2px;
  position:relative; overflow:hidden;
  transition:transform 0.2s, box-shadow 0.3s;
  animation:fadeInDown 1.4s 0.8s ease both;
  box-shadow:0 4px 20px rgba(212,150,150,0.3);
  min-height:44px; display:inline-flex; align-items:center; justify-content:center;
}
.btn-primary::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,transparent 0%,rgba(255,255,255,0.3) 50%,transparent 100%);
  transform:translateX(-100%); transition:transform 0.5s;
}
.btn-primary:hover::before { transform:translateX(100%); }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(212,150,150,0.4); }
.btn-secondary {
  font-family:'Cinzel',serif; font-size:12px; letter-spacing:0.2em;
  color:var(--blush); background:transparent; border:1px solid var(--blush);
  padding:10px 28px; cursor:pointer; border-radius:2px; margin-top:24px;
  transition:all 0.3s; animation:fadeInUp 0.8s 0.8s ease both;
  min-height:44px; display:inline-flex; align-items:center; justify-content:center;
}
.btn-secondary:hover { background:rgba(212,150,150,0.1); box-shadow:0 0 20px rgba(212,150,150,0.2); }

/* DRAW SCREEN */
#draw {
  background:rgba(42,32,35,0.68);
  padding:80px 20px 60px; text-align:center;
}
.draw-title {
  font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.4em;
  color:var(--blush); margin-bottom:40px; opacity:0.8;
}
.card-deck {
  position:relative; width:180px; height:280px;
  margin:0 auto 40px; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.deck-card {
  position:absolute; width:160px; height:260px; border-radius:12px;
  background:linear-gradient(135deg,#3A2E2E 0%,var(--dark) 100%);
  border:2px solid var(--blush); left:50%;
  transform:translateX(-50%);
  transition:all 0.6s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.deck-card::before {
  content:''; position:absolute; inset:8px;
  border:1px solid rgba(212,150,150,0.3); border-radius:8px;
}
.deck-card::after { content:'✦'; font-size:40px; color:rgba(212,150,150,0.3); }
.deck-card:nth-child(1) { transform:translateX(-50%) translateY(6px) rotate(-3deg); }
.deck-card:nth-child(2) { transform:translateX(-50%) translateY(3px) rotate(-1deg); }
.deck-card:nth-child(3) { transform:translateX(-50%) rotate(1deg); }
.deck-card.shuffling { animation:shuffle 0.5s ease infinite alternate; }
@keyframes shuffle {
  0%   { transform:translateX(calc(-50% - 20px)) rotate(-5deg); }
  100% { transform:translateX(calc(-50% + 20px)) rotate(5deg); }
}
.deck-card.fly-out { animation:flyOut 0.8s cubic-bezier(0.55,0,1,0.45) forwards; }
@keyframes flyOut {
  0%   { transform:translateX(-50%) rotate(0deg) scale(1); opacity:1; }
  100% { transform:translateX(-50%) translateY(-300px) rotate(15deg) scale(0.8); opacity:0; }
}
.click-hint {
  font-family:'Cinzel',serif; font-size:12px; letter-spacing:0.3em;
  color:var(--blush); opacity:0; transition:opacity 0.5s;
  animation:pulse 2s ease infinite; margin-top:8px;
}
.click-hint.visible { opacity:1; }
@keyframes pulse { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
.draw-instruction {
  font-family:'Cinzel',serif; font-size:12px; letter-spacing:0.25em;
  color:var(--blush-pale); opacity:0.6;
}

/* RESULT SCREEN */
#result {
  background:rgba(36,28,30,0.75);
  padding:60px 20px 40px;
}
.result-card-wrap { perspective:1000px; margin-bottom:24px; }
.result-card {
  width:240px; height:380px; position:relative;
  transform-style:preserve-3d;
  animation:cardReveal 1s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes cardReveal {
  0%   { transform:rotateY(180deg) scale(0.7); opacity:0; }
  100% { transform:rotateY(0deg) scale(1); opacity:1; }
}
.card-outer {
  background:linear-gradient(145deg,#D49696,#BF7070,#D49696,#BF9F9F,#D49696);
  padding:6px; border-radius:16px; height:100%;
  box-shadow:0 0 0 1px rgba(212,150,150,0.3),0 20px 60px rgba(0,0,0,0.8),0 0 80px rgba(196,96,96,0.3),inset 0 0 20px rgba(212,150,150,0.1);
  display:flex; flex-direction:column;
}
.card-inner {
  background:linear-gradient(135deg,#3A2E2E 0%,var(--dark) 100%);
  border-radius:12px; flex:1; display:flex; flex-direction:column;
  align-items:center; overflow:hidden; position:relative;
}
.card-arch-container { width:100%; flex:1; position:relative; padding:12px 12px 0; }
.card-arch-frame {
  width:100%; height:100%; border-radius:80px 80px 0 0;
  border:2px solid var(--blush); position:relative; overflow:hidden;
  background:linear-gradient(180deg,#3A2E2E 0%,#2A2424 100%);
  display:flex; align-items:center; justify-content:center;
}
.card-arch-frame::before {
  content:''; position:absolute; inset:6px; border-radius:74px 74px 0 0;
  border:1px solid rgba(212,150,150,0.3); pointer-events:none;
}
.card-goddess-img { width:100%; height:100%; object-fit:cover; opacity:0.9; }
.card-goddess-placeholder {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:12px; color:rgba(212,150,150,0.4); font-size:48px;
}
.card-goddess-placeholder span {
  font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.15em;
  color:rgba(212,150,150,0.3);
}
.card-bottom {
  width:100%; padding:10px 12px 14px;
  background:linear-gradient(180deg,var(--dark) 0%,#3A2E2E 100%);
  text-align:center; border-top:1px solid rgba(212,150,150,0.3); position:relative;
}
.card-bottom::before {
  content:'✦  ✦  ✦'; display:block; font-size:8px;
  color:var(--blush); letter-spacing:0.4em; margin-bottom:6px;
}
.card-god-name {
  font-family:'Cinzel Decorative',serif; font-size:12px;
  letter-spacing:0.15em; color:var(--blush-lt); text-transform:uppercase; line-height:1.3;
}
.card-god-name-zh { font-size:11px; color:var(--blush-pale); opacity:0.7; margin-top:2px; letter-spacing:0.1em; }
.card-watermark {
  position:absolute; bottom:50%; left:50%; transform:translate(-50%,50%);
  width:60px; opacity:0.08; pointer-events:none;
}
.oracle-box {
  max-width:340px; text-align:center; padding:24px;
  border:1px solid rgba(212,150,150,0.25); border-radius:4px;
  background:rgba(92,85,85,0.3); position:relative;
  animation:fadeInUp 0.8s 0.5s ease both; width:90%;
}
.oracle-box::before { content:'✦'; position:absolute; top:8px; left:12px; color:var(--blush); font-size:10px; opacity:0.5; }
.oracle-box::after  { content:'✦'; position:absolute; bottom:8px; right:12px; color:var(--blush); font-size:10px; opacity:0.5; }
.oracle-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.4em; color:var(--blush); margin-bottom:12px; opacity:0.7; }
.oracle-text { font-size:15px; line-height:1.9; color:var(--blush-pale); font-style:italic; }
.oracle-domain { margin-top:12px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.3em; color:var(--blush); opacity:0.6; }
.flip-hint {
  font-size:11px; font-family:'Cinzel',serif; letter-spacing:0.25em;
  color:var(--blush); opacity:0; margin-bottom:16px;
  animation:pulse 2s ease infinite; transition:opacity 0.5s;
}
.flip-hint.visible { opacity:1; }

/* ADMIN */
#admin {
  display:none; background:rgba(36,28,30,0.88);
  min-height:100vh; padding:80px 20px 40px;
}
.admin-header { text-align:center; margin-bottom:32px; }
.admin-title { font-family:'Cinzel',serif; font-size:18px; letter-spacing:0.3em; color:var(--blush); margin-bottom:8px; }
.admin-sub { font-size:13px; color:rgba(212,150,150,0.5); letter-spacing:0.1em; }
.admin-form {
  max-width:600px; margin:0 auto 40px;
  background:rgba(36,28,30,0.55); border:1px solid rgba(212,150,150,0.2);
  border-radius:4px; padding:28px;
}
.form-group { margin-bottom:20px; }
.form-label { display:block; font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.2em; color:var(--blush); margin-bottom:8px; opacity:0.8; }
.form-input, .form-textarea {
  width:100%; background:rgba(46,40,40,0.8); border:1px solid rgba(212,150,150,0.25);
  border-radius:2px; color:var(--cream); padding:10px 14px;
  font-family:'EB Garamond',serif; font-size:15px; transition:border-color 0.3s; outline:none;
}
.form-input:focus, .form-textarea:focus { border-color:var(--blush); box-shadow:0 0 12px rgba(212,150,150,0.1); }
.form-textarea { resize:vertical; min-height:100px; }
.image-upload-area {
  border:1px dashed rgba(212,150,150,0.3); border-radius:4px; padding:24px;
  text-align:center; cursor:pointer; transition:all 0.3s; background:rgba(46,40,40,0.4);
}
.image-upload-area:hover { border-color:var(--blush); background:rgba(212,150,150,0.05); }
.upload-icon { font-size:28px; color:var(--blush); opacity:0.5; margin-bottom:8px; }
.upload-text { font-size:12px; color:rgba(212,150,150,0.5); letter-spacing:0.1em; }
.upload-preview { max-width:100px; max-height:140px; object-fit:cover; margin-top:12px; border-radius:4px; border:1px solid var(--blush); display:none; }
.admin-grid { max-width:800px; margin:0 auto; }
.admin-grid-title { font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.3em; color:var(--blush); margin-bottom:16px; opacity:0.8; text-align:center; }
.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:16px; }
.admin-card-item { background:rgba(92,85,85,0.3); border:1px solid rgba(212,150,150,0.2); border-radius:4px; padding:12px; text-align:center; }
.admin-card-thumb { width:80px; height:100px; object-fit:cover; border-radius:4px; margin-bottom:8px; border:1px solid rgba(212,150,150,0.3); }
.admin-card-name { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.1em; color:var(--blush-lt); display:block; margin-bottom:8px; }
.admin-card-actions { display:flex; gap:6px; justify-content:center; }
.btn-sm { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.1em; padding:4px 10px; border-radius:2px; cursor:pointer; border:1px solid; transition:all 0.2s; min-height:36px; display:inline-flex; align-items:center; }
.btn-edit { color:var(--blush); border-color:rgba(212,150,150,0.4); background:transparent; }
.btn-edit:hover { background:rgba(212,150,150,0.1); }
.btn-delete { color:#cc6666; border-color:rgba(204,102,102,0.4); background:transparent; }
.btn-delete:hover { background:rgba(204,102,102,0.1); }
.empty-state { text-align:center; padding:40px; color:rgba(212,150,150,0.3); font-family:'Cinzel',serif; font-size:12px; letter-spacing:0.2em; grid-column:1/-1; }
.notif {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(80px);
  background:linear-gradient(135deg,#C8A882,#E8D5B0);
  color:#3A2E2E; font-family:'Cinzel',serif; font-size:12px; letter-spacing:0.2em;
  padding:12px 28px; border-radius:2px;
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  z-index:9999; box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.notif.show { transform:translateX(-50%) translateY(0); }

/* RESPONSIVE */
@media (max-width:480px) {
  .mode-btn { padding:5px 10px; font-size:10px; }
  #intro { padding:70px 20px 40px; }
  .intro-desc { font-size:14px; }
  .btn-primary { padding:12px 28px; font-size:12px; }
  .card-deck { width:160px; height:250px; }
  .deck-card { width:140px; height:230px; }
  .result-card { width:200px; height:320px; }
  .card-god-name { font-size:10px; }
  .oracle-box { padding:18px 16px; }
  .oracle-text { font-size:14px; }
  #admin { padding:70px 16px 40px; }
  .admin-form { padding:20px 16px; }
  .cards-grid { grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); }
}
@media (min-width:769px) {
  .result-card { width:260px; height:410px; }
  .oracle-box { max-width:380px; }
  .admin-form { max-width:640px; }
}
@supports (padding-bottom:env(safe-area-inset-bottom)) {
  .screen { padding-bottom:calc(env(safe-area-inset-bottom) + 20px); }
  .mode-switcher { top:calc(env(safe-area-inset-top) + 12px); }
}
</style>
</head>
<body>

<div id="particles"></div>



<!-- password modal -->
<div id="pwModal" style="display:none;position:fixed;inset:0;z-index:10000;background:rgba(36,28,30,0.92);align-items:center;justify-content:center;">
  <div style="background:#2E2828;border:1px solid rgba(212,150,150,0.3);border-radius:4px;padding:40px 32px;text-align:center;max-width:320px;width:90%;">
    <div style="font-family:'Cinzel',serif;font-size:13px;letter-spacing:0.3em;color:var(--blush);margin-bottom:24px;">✦ 管理員入口 ✦</div>
    <input type="password" id="pwInput" placeholder="請輸入密碼"
      style="width:100%;background:rgba(46,40,40,0.8);border:1px solid rgba(212,150,150,0.25);border-radius:2px;color:#FAF3F3;padding:10px 14px;font-family:'EB Garamond',serif;font-size:15px;outline:none;margin-bottom:16px;box-sizing:border-box;"
      onkeydown="if(event.key==='Enter')checkPw()">
    <div style="display:flex;gap:10px;justify-content:center;">
      <button onclick="checkPw()"
        style="font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.2em;color:#3A2E2E;background:linear-gradient(135deg,#C8A882 0%,#E8D5B0 50%,#C8A882 100%);border:none;padding:10px 24px;border-radius:2px;cursor:pointer;">
        進入
      </button>
      <button onclick="closePwModal()"
        style="font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.2em;color:var(--blush);background:transparent;border:1px solid rgba(212,150,150,0.3);padding:10px 20px;border-radius:2px;cursor:pointer;">
        取消
      </button>
    </div>
    <div id="pwError" style="color:#cc6666;font-size:12px;margin-top:12px;font-family:'Cinzel',serif;letter-spacing:0.1em;display:none;">密碼錯誤，請再試一次</div>
    <div id="adminExitBtn" style="display:none;margin-top:20px;">
      <button onclick="showMode('front');closePwModal()"
        style="font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.2em;color:var(--blush);background:transparent;border:1px solid rgba(212,150,150,0.3);padding:8px 20px;border-radius:2px;cursor:pointer;">
        ← 返回前台
      </button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<!-- INTRO -->
<div class="screen active" id="intro">
  <div class="logo-wrap">
    <span class="logo-wrap-text">Éphémère</span>
  </div>
  <div class="intro-title">女神神諭卡</div>
  <div class="intro-subtitle">GODDESS ORACLE</div>
  <div class="gold-divider"></div>
  <div class="intro-desc">讓今日的女神能量為你指引方向<br>靜下心來，感受內心的聲音</div>
  <button class="btn-primary" onclick="startDraw()">✦ 開始今日抽牌 ✦</button>
</div>

<!-- DRAW -->
<div class="screen" id="draw">
  <div class="draw-title">✦ 深呼吸，靜心感受 ✦</div>
  <div class="card-deck" id="cardDeck" onclick="pickCard()">
    <div class="deck-card" id="dc1"></div>
    <div class="deck-card" id="dc2"></div>
    <div class="deck-card" id="dc3"></div>
  </div>
  <div class="click-hint" id="clickHint">▽ 點擊牌組開始抽牌 ▽</div>
  <br>
  <div class="draw-instruction" id="drawInstruction">集中意念，點擊牌組</div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="result-card-wrap">
    <div class="result-card" id="resultCard">
      <div class="card-outer">
        <div class="card-inner">
          <div class="card-arch-container">
            <div class="card-arch-frame">
              <div class="card-goddess-placeholder" id="goddessImgWrap">
                <div>✦</div>
                <span>GODDESS</span>
              </div>
            </div>
          </div>
          <div class="card-bottom">
            <div class="card-god-name" id="resultGodName">HATHOR</div>

  <button class="btn-secondary" onclick="resetDraw()">✦ 再次抽牌 ✦</button>
</div>

<!-- ADMIN -->
<div id="admin">
  <div class="admin-header">
    <div class="admin-title">✦ 後台管理 ✦</div>
    <div class="admin-sub">GODDESS CARD MANAGEMENT</div>
  </div>
  <div class="admin-form">
    <input type="hidden" id="editId">
    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.2em;color:rgba(212,150,150,0.6);line-height:2;">
        卡牌資料存放於 Airtable<br>請點下方按鈕前往編輯
      </div>
    </div>
    <div style="text-align:center;padding:20px 0 8px;">
      <a href="https://airtable.com/appgS9ZlfSa8fgFMu/tblF0mr0BpeiOQzEn" target="_blank"
        style="font-family:'Cinzel',serif;font-size:12px;letter-spacing:0.2em;color:#3A2E2E;
        background:linear-gradient(135deg,#C8A882 0%,#E8D5B0 50%,#C8A882 100%);
        padding:12px 28px;border-radius:2px;text-decoration:none;display:inline-block;">
        ✦ 前往 Airtable 編輯卡牌 ✦
      </a>
      <div style="margin-top:16px;">
        <button class="btn-secondary" onclick="fetchCardsFromAirtable(renderAdminGrid)" style="font-size:11px;padding:8px 20px;margin-top:0;animation:none;">↺ 重新載入卡牌</button>
      </div>
    </div>
  </div>
  <div class="admin-grid">
    <div class="admin-grid-title">✦ 已建立的卡牌 ✦</div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>
</div>

<script>
// ── DEFAULT DATA ──
const DEFAULT_CARDS = [
  { id:1, nameEn:'HATHOR', nameZh:'哈索爾', domain:'美麗與豐盛', oracle:'美麗本是你與生俱來的力量。\n今日，讓豐盛流向你所願望的一切。', img:'' },
  { id:2, nameEn:'KALI', nameZh:'卡莉', domain:'轉化與重生', oracle:'在毀滅之中，新生正在等待。\n放下執著，讓舊有的離去，迎接真正的你。', img:'' },
  { id:3, nameEn:'GUANYIN', nameZh:'觀世音菩薩', domain:'秩序與滋養', oracle:'慈悲如水，流向最需要的地方。\n今日，你既是被愛護者，也是愛護者。', img:'' }
];

function loadCards() {
  try {
    var s = localStorage.getItem('ephemere_cards');
    return s ? JSON.parse(s) : DEFAULT_CARDS;
  } catch(e) { return DEFAULT_CARDS; }
}
function saveCards(cards) {
  try { localStorage.setItem('ephemere_cards', JSON.stringify(cards)); } catch(e) {}
}
var cards = loadCards();

// ── PARTICLES ──
(function() {
  var container = document.getElementById('particles');
  for (var i = 0; i < 30; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    p.style.left = (Math.random()*100) + '%';
    p.style.width = (Math.random()*3+1) + 'px';
    p.style.height = p.style.width;
    p.style.animationDuration = (Math.random()*8+6) + 's';
    p.style.animationDelay = (Math.random()*8) + 's';
    container.appendChild(p);
  }
})();

// ── MODE ──
function showMode(mode) {
  document.querySelectorAll('.mode-btn').forEach(function(b, i) {
    b.classList.toggle('active', (i===0 && mode==='front') || (i===1 && mode==='admin'));
  });
  var admin = document.getElementById('admin');
  var screens = ['intro','draw','result'];
  if (mode === 'admin') {
    admin.style.display = 'block';
    screens.forEach(function(id) { document.getElementById(id).style.display = 'none'; });
    renderAdminGrid();
  } else {
    admin.style.display = 'none';
    screens.forEach(function(id) {
      var el = document.getElementById(id);
      el.style.display = el.classList.contains('active') ? 'flex' : 'none';
    });
  }
}

// ── SCREEN ──
function showScreen(id) {
  ['intro','draw','result'].forEach(function(s) {
    var el = document.getElementById(s);
    el.classList.toggle('active', s === id);
    el.style.display = s === id ? 'flex' : 'none';
  });
}

// ── DRAW ──
var drawState = 'idle';

function startDraw() {
  drawState = 'idle';
  ['dc1','dc2','dc3'].forEach(function(id) {
    var el = document.getElementById(id);
    el.classList.remove('shuffling','fly-out');
  });
  showScreen('draw');
  document.getElementById('clickHint').classList.remove('visible');
  document.getElementById('drawInstruction').textContent = '正在連結女神能量…';

  if (cardsLoaded && cards.length > 0) {
    document.getElementById('clickHint').classList.add('visible');
    document.getElementById('drawInstruction').textContent = '集中意念，點擊牌組';
  } else {
    fetchCardsFromAirtable(function() {
      document.getElementById('clickHint').classList.add('visible');
      document.getElementById('drawInstruction').textContent = '集中意念，點擊牌組';
    });
  }
}

function pickCard() {
  if (drawState === 'picked') return;
  if (drawState === 'idle') {
    drawState = 'shuffling';
    document.getElementById('clickHint').classList.remove('visible');
    document.getElementById('drawInstruction').textContent = '牌正在為你尋找答案…';
    ['dc1','dc2','dc3'].forEach(function(id) { document.getElementById(id).classList.add('shuffling'); });
    setTimeout(function() {
      ['dc1','dc2','dc3'].forEach(function(id) { document.getElementById(id).classList.remove('shuffling'); });
      document.getElementById('drawInstruction').textContent = '命運之牌已為你揭示';
      document.getElementById('dc3').classList.add('fly-out');
      drawState = 'picked';
      setTimeout(showResult, 900);
    }, 2500);
  }
}

function showResult() {
  var available = cards.filter(function(c) { return c.nameEn; });
  if (!available.length) { showNotif('請先在後台新增卡牌！'); showScreen('intro'); return; }
  var card = available[Math.floor(Math.random() * available.length)];
  document.getElementById('resultGodName').textContent = card.nameEn;
  document.getElementById('resultGodNameZh').textContent = card.nameZh;
  document.getElementById('oracleText').innerHTML = card.oracle.replace(/\n/g, '<br>');
  document.getElementById('oracleDomain').textContent = card.domain;
  var imgWrap = document.getElementById('goddessImgWrap');
  if (card.img) {
    imgWrap.innerHTML = '<img src="' + card.img + '" class="card-goddess-img">';
  } else {
    imgWrap.innerHTML = '<div style="font-size:48px;color:rgba(212,150,150,0.4)">✦</div><span style="font-family:Cinzel,serif;font-size:11px;letter-spacing:0.15em;color:rgba(212,150,150,0.3)">' + card.nameEn + '</span>';
  }
  showScreen('result');
  setTimeout(function() { document.getElementById('flipHint').classList.add('visible'); }, 800);
}

function resetDraw() {
  drawState = 'idle';
  document.getElementById('flipHint').classList.remove('visible');
  startDraw();
}

// ── ADMIN ──
var imgDataUrl = '';

function previewImage(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    imgDataUrl = e.target.result;
    var prev = document.getElementById('uploadPreview');
    prev.src = imgDataUrl;
    prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function saveCard() {
  showNotif('請直接到 Airtable 新增／編輯卡牌資料');
}

function clearForm() {
  ['fNameEn','fNameZh','fDomain','fOracle','editId'].forEach(function(id) { document.getElementById(id).value = ''; });
  document.getElementById('uploadPreview').style.display = 'none';
  imgDataUrl = '';
}

function editCard(id) {
  var card = cards.find(function(c) { return c.id === id; });
  if (!card) return;
  document.getElementById('fNameEn').value = card.nameEn;
  document.getElementById('fNameZh').value = card.nameZh;
  document.getElementById('fDomain').value = card.domain;
  document.getElementById('fOracle').value = card.oracle;
  document.getElementById('editId').value = id;
  if (card.img) { imgDataUrl = card.img; var p = document.getElementById('uploadPreview'); p.src = card.img; p.style.display = 'block'; }
  window.scrollTo(0,0);
}

function deleteCard(id) {
  if (!confirm('確定要刪除這張卡牌嗎？')) return;
  cards = cards.filter(function(c) { return c.id !== id; });
  saveCards(cards);
  renderAdminGrid();
  showNotif('卡牌已刪除');
}

function renderAdminGrid() {
  var grid = document.getElementById('cardsGrid');
  var displayCards = cards.length > 0 ? cards : loadAdminCards();
  if (!displayCards.length) {
    grid.innerHTML = '<div class="empty-state">尚未載入卡牌資料<br>請確認 Airtable 已填入資料</div>';
    // try fetch
    fetchCardsFromAirtable(function() {
      if (cards.length > 0) renderAdminGrid();
    });
    return;
  }
  var html = '';
  displayCards.forEach(function(c) {
    var thumb = c.img
      ? '<img class="admin-card-thumb" src="' + c.img + '" alt="' + c.nameEn + '">'
      : '<div style="width:80px;height:100px;background:rgba(92,85,85,0.4);border:1px solid rgba(212,150,150,0.2);border-radius:4px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;color:rgba(212,150,150,0.3);font-size:20px;">✦</div>';
    html += '<div class="admin-card-item">' + thumb + '<span class="admin-card-name">' + c.nameEn + '<br>' + c.nameZh + '</span></div>';
  });
  // Add note that edits go to Airtable
  html += '<div style="grid-column:1/-1;text-align:center;padding:20px;font-family:Cinzel,serif;font-size:10px;letter-spacing:0.2em;color:rgba(212,150,150,0.4);">✦ 請直接在 Airtable 編輯卡牌資料 ✦</div>';
  grid.innerHTML = html;
}

function showNotif(msg) {
  var n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(function() { n.classList.remove('show'); }, 2500);
}

// copyright click -> admin entry
document.addEventListener('DOMContentLoaded', function() {
  var ct = document.getElementById('copyrightText');
  if (ct) {
    ct.addEventListener('click', function() { openPwModal(); });
    ct.addEventListener('mouseover', function() { ct.style.color = 'rgba(212,150,150,0.6)'; });
    ct.addEventListener('mouseout', function() { ct.style.color = 'rgba(255,255,255,0.25)'; });
  }
});

// ── ADMIN ACCESS ──
var ADMIN_PW = 'ephemere1112';  // ← 這裡改成你的密碼



function openPwModal() {
  var modal = document.getElementById('pwModal');
  modal.style.display = 'flex';
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').style.display = 'none';
  document.getElementById('adminExitBtn').style.display = 'none';
  setTimeout(function() { document.getElementById('pwInput').focus(); }, 100);
}

function closePwModal() {
  document.getElementById('pwModal').style.display = 'none';
}

function checkPw() {
  var val = document.getElementById('pwInput').value;
  if (val === ADMIN_PW) {
    document.getElementById('pwError').style.display = 'none';
    showMode('admin');
    // show exit button inside modal briefly then close
    closePwModal();
    // add a small exit button in admin view
    showAdminExitBar();
  } else {
    document.getElementById('pwError').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

function showAdminExitBar() {
  var existing = document.getElementById('adminExitBar');
  if (existing) return;
  var bar = document.createElement('div');
  bar.id = 'adminExitBar';
  bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(36,28,30,0.95);border-bottom:1px solid rgba(212,150,150,0.2);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;';
  bar.innerHTML = '<span style="font-family:Cinzel,serif;font-size:11px;letter-spacing:0.3em;color:rgba(212,150,150,0.6);">✦ 後台管理模式 ✦</span>'
    + '<button onclick="showMode('front');document.getElementById('adminExitBar').remove()" '
    + 'style="font-family:Cinzel,serif;font-size:10px;letter-spacing:0.15em;color:var(--blush);background:transparent;border:1px solid rgba(212,150,150,0.3);padding:6px 16px;border-radius:2px;cursor:pointer;">← 返回前台</button>';
  document.body.prepend(bar);
}
</script>

<!-- copyright / admin entry -->
<div id="copyrightBar" style="position:fixed;bottom:0;left:0;right:0;z-index:500;text-align:center;padding:10px 20px;">
  <span id="copyrightText"
    style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.2em;
    color:rgba(255,255,255,0.25);cursor:pointer;
    transition:color 0.3s;user-select:none;display:inline-block;padding:4px 8px;">
    © 2026 蜉蝣 éphémère · All Rights Reserved
  </span>
</div>
</body>
</html>
